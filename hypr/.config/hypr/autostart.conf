
#################
### AUTOSTART ###
#################

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/dunst
exec-once = waybar
exec-once = swww-daemon
exec-once = swww img $wallpaper --transition-fps 255 --transition-type outer --transition-duration 0.8
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridles
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Message platforms
exec-once = flatpak run com.discordapp.Discord --start-minimized
exec-once = teams-for-linux --minimized

# First app
exec-once = env KITTY_STARTUP=1 kitty
