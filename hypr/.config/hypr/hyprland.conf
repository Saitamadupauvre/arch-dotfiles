
# Theme
source = /home/alban/dotfiles/themes/catppuccin/.config/hypr/theme.conf

###################
### MY PROGRAMS  ###
###################

$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun -theme ~/.config/rofi/rounded-nord-dark.rasi
$browser = zen-browser
$notes = obsidian
$editor = code
$editor-alt = subl
$colorPicker = hyprpicker

# Split config files
source = /home/alban/dotfiles/hypr/.config/hypr/env.conf
source = /home/alban/dotfiles/hypr/.config/hypr/autostart.conf
source = /home/alban/dotfiles/hypr/.config/hypr/monitors.conf
source = /home/alban/dotfiles/hypr/.config/hypr/binds.conf
source = /home/alban/dotfiles/hypr/.config/hypr/rules.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,1.25,mirror,DP-1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 100, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    preserve_split = true
}

master {
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
}

#############
### INPUT ###
#############

input {
    kb_layout = fr
    follow_mouse = 1
    sensitivity = 0
    numlock_by_default = true

    touchpad {
        natural_scroll = true
    }
}

gestures {
    gesture = 3, horizontal, workspace
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
