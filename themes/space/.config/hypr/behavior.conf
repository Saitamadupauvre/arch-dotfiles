# Space theme — floaty behavior

general {
    gaps_in = 8
    gaps_out = 16
    border_size = 1
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16
    active_opacity = 0.95
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 8
        passes = 4
        new_optimizations = true
        vibrancy = 0.3
        ignore_opacity = false
    }
}

animations {
    enabled = true

    # Floaty, elastic curves
    bezier = float, 0.0, 0.9, 0.1, 1.08
    bezier = floatIn, 0.0, 1.2, 0.1, 1.0
    bezier = floatOut, 0.4, 0.0, 0.2, 1.0
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 8, float, slide
    animation = windowsIn, 1, 7, floatIn, popin 80%
    animation = windowsOut, 1, 6, floatOut, popin 80%
    animation = windowsMove, 1, 8, float
    animation = border, 1, 1, liner
    animation = borderangle, 1, 200, liner, loop
    animation = fade, 1, 12, default
    animation = workspaces, 1, 7, float, slidevert
}

dwindle {
    preserve_split = true
}

master {
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
}

# Rendre les applications utilitaires flottantes par défaut (Nouvelle syntaxe unifiée)
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(qt5ct)$
windowrule = float 1, match:class ^(kvantummanager)$

# Appliquer un arrondi de 24 uniquement aux fenêtres qui flottent
windowrule = rounding 24, match:float 1
