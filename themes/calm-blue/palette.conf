# Calm Blue — single source of truth for every color in this theme.
# Hex values WITHOUT leading '#' (templates add '#' or wrap in rgb()/rgba() as needed).
# Edit this file, then run generate.sh (or theme-switch.sh, which calls it automatically).

# deep navy backgrounds, blue accent with a soft purple undertone
BG0=0a0e1a
BG1=0f1524
BG2=1b2338
BORDER_DIM=2c3a5c
FG0=cddcff
FG1=cddcff
FG2=a6bdf0
FG3=5c7099
ACCENT=5c7fff
ACCENT2=9a7dff
FAIL=f7768e
GOOD=9ece6a

# decimal r,g,b of the above — GTK3's CSS parser rejects 8-digit alpha-hex,
# so alpha-blended colors must use rgba(r,g,b,a) instead
BG1_RGB=15,21,36
ACCENT2_RGB=154,125,255