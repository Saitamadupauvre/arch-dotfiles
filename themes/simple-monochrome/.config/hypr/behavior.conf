# Simple Monochrome — behavior

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 16
    active_opacity = 0.95
    inactive_opacity = 0.88

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        vibrancy = 0.15
        ignore_opacity = true
    }
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = snap, 0.2, 0.9, 0.2, 1

    animation = windows, 1, 4, snap, slide
    animation = windowsIn, 1, 4, snap, slide
    animation = windowsOut, 1, 3, snap, slide
    animation = windowsMove, 1, 3, snap, slide
    animation = border, 1, 1, linear
    animation = borderangle, 1, 270, linear, loop
    animation = fade, 1, 6, default
    animation = workspaces, 1, 3, snap
}

dwindle {
    preserve_split = true
}

master {
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
}
